<div class="container mx-auto px-4 py-8 max-w-7xl">
  <h2 class="text-3xl md:text-4xl font-bold text-gray-800 mb-8 tracking-tight">
    Featured Architecture Projects
  </h2>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
    <!-- Vòng lặp @for của Angular 17+ -->
    @for (project of projects; track project.id) {
      <div
        class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden transition-all duration-300 hover:-translate-y-1.5 hover:shadow-xl cursor-pointer group"
        [attr.data-id]="project.id"
        data-target="project-card"
      >
        <div class="relative overflow-hidden h-56">
          <img
            [src]="project.imageUrl"
            [alt]="project.name"
            class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
          />
          <div class="absolute top-4 right-4 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full">
            <span class="text-xs font-semibold text-gray-700 tracking-wide uppercase">
              {{ project.category }}
            </span>
          </div>
        </div>

        <div class="p-6">
          <h3
            class="text-xl font-semibold text-gray-900 mb-2 group-hover:text-blue-600 transition-colors"
          >
            {{ project.name }}
          </h3>
        </div>
      </div>
    } @empty {
      <div
        class="col-span-full py-12 text-center bg-gray-50 rounded-2xl border border-dashed border-gray-300"
      >
        <p class="text-gray-500 text-lg">No projects available at the moment.</p>
      </div>
    }
  </div>
</div>
